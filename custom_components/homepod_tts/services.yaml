say:
  name: Say
  description: Play a TTS message with optional chime on a HomePod.
  fields:
    entity_id:
      name: Entity
      description: The homepod_tts notify entity to use.
      required: true
      selector:
        entity:
          integration: homepod_tts
          domain: notify
    message:
      name: Message
      description: The text to speak.
      required: true
      example: "Package delivered, check the front porch"
      selector:
        text:
    prompt:
      name: Style prompt
      description: Style instructions for the TTS voice (e.g. "Say this in a calm whisper"). Overrides the default prompt.
      required: false
      example: "Say this gently and calmly"
      selector:
        text:
    speaker:
      name: Speaker(s)
      description: Target one or more HomePods (apple_tv media_player entities). Overrides the default speaker. Multiple speakers play in parallel.
      required: false
      selector:
        entity:
          integration: apple_tv
          domain: media_player
          multiple: true
    chime:
      name: Chime
      description: Play chime before announcement (overrides default).
      required: false
      default: true
      selector:
        boolean:
    chime_volume:
      name: Chime volume
      description: Relative chime volume in the audio mix (0.0-2.0, 1.0 = unchanged). Overrides default.
      required: false
      selector:
        number:
          min: 0.0
          max: 2.0
          step: 0.1
          mode: slider
    volume_level:
      name: Volume level
      description: Announcement volume 0.0-1.0 (overrides default).
      required: false
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider
    compress:
      name: Compression
      description: Dynamic range compression preset for TTS audio (overrides default).
      required: false
      selector:
        select:
          options:
            - "off"
            - "light"
            - "moderate"
            - "heavy"
    offset:
      name: Chime offset (ms)
      description: Offset between chime and TTS in milliseconds. Negative values trim the chime tail to reduce the gap (overrides default).
      required: false
      selector:
        number:
          min: -5000
          max: 5000
          step: 100
          unit_of_measurement: ms
          mode: slider
    quiet:
      name: Quiet mode
      description: Force quiet mode for this call (whisper prompt, lower volume). Overrides the quiet mode entity state.
      required: false
      selector:
        boolean:

play_music:
  name: Play Music
  description: Generate music via Gemini Lyria 3 and play it on HomePod speakers.
  fields:
    entity_id:
      name: Entity
      description: The homepod_tts notify entity to use.
      required: true
      selector:
        entity:
          integration: homepod_tts
          domain: notify
    prompt:
      name: Music prompt
      description: Describe the music to generate (style, mood, instruments, lyrics topic, etc.)
      required: true
      example: "Upbeat pop song about a sunny day at the beach, with guitar and drums"
      selector:
        text:
          multiline: true
    volume_level:
      name: Volume level
      description: Playback volume 0.0-1.0 (overrides default).
      required: false
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider
    speaker:
      name: Speaker(s)
      description: Target one or more HomePods. Overrides the default speakers.
      required: false
      selector:
        entity:
          integration: apple_tv
          domain: media_player
          multiple: true

clear_cache:
  name: Clear TTS cache
  description: Remove all cached TTS audio files.
